<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#8b4f46">
<title>SMMSRBM</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<header>
  <h1>SMMSRBM</h1>
  <p>Sistem Maklumat Murid SR Batu Marang</p>
</header>
<main class="container">
  <h2 class="dashboard-title">Halaman Utama</h2>
  <section class="stats">
    <div class="stat"><p>Jumlah Murid</p><strong id="jumlahMurid">0</strong></div>
    <div class="stat"><p>Murid Lelaki</p><strong id="jumlahLelaki">0</strong></div>
    <div class="stat"><p>Murid Perempuan</p><strong id="jumlahPerempuan">0</strong></div>
  </section>
  <section class="menu">
    <a href="senarai-murid.html"><h3>Senarai Murid</h3><p>Lihat, cari, edit dan padam maklumat murid.</p></a>
    <a href="tambah-murid.html"><h3>Tambah Murid</h3><p>Daftar maklumat murid baharu.</p></a>
  </section>
</main>
<footer>SMMSRBM — Sistem Maklumat Murid SR Batu Marang</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase.js";
const db=getFirestore(initializeApp(firebaseConfig));
onSnapshot(collection(db,"students"),snap=>{
  let lelaki=0,perempuan=0;
  snap.forEach(d=>{
    const x=d.data();
    if(x.jantina==="Lelaki") lelaki++;
    if(x.jantina==="Perempuan") perempuan++;
  });
  document.getElementById("jumlahMurid").textContent=snap.size;
  document.getElementById("jumlahLelaki").textContent=lelaki;
  document.getElementById("jumlahPerempuan").textContent=perempuan;
});
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
</script>
</body>
</html>
