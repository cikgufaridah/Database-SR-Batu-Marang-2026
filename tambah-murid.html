<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tambah Murid | SMMSRBM</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .header {
      background: #f4c7b8;
      padding: 20px;
      text-align: center;
      border-bottom: 4px solid #8b4f46;
    }

    .header h1 {
      font-size: 26px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 15px;
    }

    .container {
      width: 95%;
      max-width: 900px;
      margin: 25px auto;
      padding: 25px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #8b4f46;
      font-weight: bold;
      text-decoration: none;
    }

    .section-title {
      margin: 25px 0 15px;
      padding: 10px;
      background: #eeeeee;
      border-left: 5px solid #8b4f46;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .three-column {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }

    .radio-group {
      display: flex;
      gap: 25px;
      padding-top: 7px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
    }

    .radio-group input {
      width: auto;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    button,
    .cancel-button {
      padding: 12px 22px;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
    }

    .save-button {
      background: #8b4f46;
      color: white;
    }

    .save-button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .cancel-button {
      background: #ddd;
      color: #222;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 5px;
      font-weight: bold;
    }

    .message-success {
      background: #d9f5df;
      color: #19692c;
      border: 1px solid #91d49e;
    }

    .message-error {
      background: #ffe0e0;
      color: #9b1c1c;
      border: 1px solid #efaaaa;
    }

    @media (max-width: 650px) {
      .two-column,
      .three-column {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 18px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Tambah Murid</h1>
    <p>SMMSRBM — Sistem Maklumat Murid SR Batu Marang</p>
  </header>

  <main class="container">

    <a href="index.html" class="back-link">
      ← Kembali ke Halaman Utama
    </a>

    <form id="borangMurid">

      <h2 class="section-title">A. Maklumat Murid</h2>

      <div class="form-group">
        <label for="namaMurid">Nama Penuh Murid</label>
        <input type="text" id="namaMurid" required>
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="idSekolah">ID Sekolah</label>
          <input type="text" id="idSekolah" required>
        </div>

        <div class="form-group">
          <label for="tahun">Tahun</label>

          <select id="tahun" required>
            <option value="">Pilih Tahun</option>
            <option value="1">Tahun 1</option>
            <option value="2">Tahun 2</option>
            <option value="3">Tahun 3</option>
            <option value="4">Tahun 4</option>
            <option value="5">Tahun 5</option>
            <option value="6">Tahun 6</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Jantina</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="jantina" value="Lelaki" required>
            Lelaki
          </label>

          <label>
            <input type="radio" name="jantina" value="Perempuan">
            Perempuan
          </label>
        </div>
      </div>

      <div class="three-column">
        <div class="form-group">
          <label for="tarikhLahir">Tarikh Lahir</label>
          <input type="date" id="tarikhLahir">
        </div>

        <div class="form-group">
          <label for="suratBeranak">No. Surat Beranak</label>
          <input type="text" id="suratBeranak">
        </div>

        <div class="form-group">
          <label for="bruHims">No. Bru-HIMS</label>
          <input type="text" id="bruHims">
        </div>
      </div>

      <h2 class="section-title">B. Alamat Tempat Tinggal</h2>

      <div class="form-group">
        <label for="alamat">Alamat Lengkap Tempat Tinggal</label>
        <textarea id="alamat"></textarea>
      </div>

      <h2 class="section-title">C. Maklumat Ayah</h2>

      <div class="form-group">
        <label for="namaAyah">Nama Penuh</label>
        <input type="text" id="namaAyah">
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="pintarAyah">No. Pintar</label>
          <input type="text" id="pintarAyah">
        </div>

        <div class="form-group">
          <label for="warnaAyah">Warna Kad Pintar</label>

          <select id="warnaAyah">
            <option value="">Pilih Warna</option>
            <option value="Kuning">Kuning</option>
            <option value="Ungu">Ungu</option>
            <option value="Hijau">Hijau</option>
            <option value="Lain-lain">Lain-lain</option>
          </select>
        </div>
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="pekerjaanAyah">Pekerjaan</label>
          <input type="text" id="pekerjaanAyah">
        </div>

        <div class="form-group">
          <label for="telefonAyah">No. Telefon</label>
          <input type="tel" id="telefonAyah">
        </div>
      </div>

      <h2 class="section-title">D. Maklumat Ibu</h2>

      <div class="form-group">
        <label for="namaIbu">Nama Penuh</label>
        <input type="text" id="namaIbu">
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="pintarIbu">No. Pintar</label>
          <input type="text" id="pintarIbu">
        </div>

        <div class="form-group">
          <label for="warnaIbu">Warna Kad Pintar</label>

          <select id="warnaIbu">
            <option value="">Pilih Warna</option>
            <option value="Kuning">Kuning</option>
            <option value="Ungu">Ungu</option>
            <option value="Hijau">Hijau</option>
            <option value="Lain-lain">Lain-lain</option>
          </select>
        </div>
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="pekerjaanIbu">Pekerjaan</label>
          <input type="text" id="pekerjaanIbu">
        </div>

        <div class="form-group">
          <label for="telefonIbu">No. Telefon</label>
          <input type="tel" id="telefonIbu">
        </div>
      </div>

      <h2 class="section-title">
        E. Penjaga yang Mudah Dihubungi
      </h2>

      <div class="three-column">
        <div class="form-group">
          <label for="namaDihubungi">Nama Penuh</label>
          <input type="text" id="namaDihubungi">
        </div>

        <div class="form-group">
          <label for="hubunganDihubungi">Hubungan dengan Murid</label>
          <input type="text" id="hubunganDihubungi">
        </div>

        <div class="form-group">
          <label for="telefonDihubungi">No. Telefon</label>
          <input type="tel" id="telefonDihubungi">
        </div>
      </div>

      <div class="button-group">
        <button type="submit" id="butangSimpan" class="save-button">
          Simpan Maklumat
        </button>

        <a href="index.html" class="cancel-button">
          Batal
        </a>
      </div>

      <div id="mesejBerjaya" class="message message-success">
        Maklumat murid berjaya disimpan.
      </div>

      <div id="mesejRalat" class="message message-error">
        Maklumat tidak dapat disimpan.
      </div>

    </form>

  </main>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdwAAJ6UwN4ekwDFepjrUJXPrIDM0x2qA",
      authDomain: "sistem-maklumat-murid-srbm.firebaseapp.com",
      projectId: "sistem-maklumat-murid-srbm",
      storageBucket: "sistem-maklumat-murid-srbm.firebasestorage.app",
      messagingSenderId: "532951554931",
      appId: "1:532951554931:web:d3551739b68420af1a0306"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const borang = document.getElementById("borangMurid");
    const butangSimpan = document.getElementById("butangSimpan");
    const mesejBerjaya = document.getElementById("mesejBerjaya");
    const mesejRalat = document.getElementById("mesejRalat");

    borang.addEventListener("submit", async function (event) {
      event.preventDefault();

      mesejBerjaya.style.display = "none";
      mesejRalat.style.display = "none";

      const jantinaDipilih = document.querySelector(
        'input[name="jantina"]:checked'
      );

      if (!jantinaDipilih) {
        alert("Sila pilih jantina murid.");
        return;
      }

      butangSimpan.disabled = true;
      butangSimpan.textContent = "Sedang menyimpan...";

      const dataMurid = {
        namaMurid: document.getElementById("namaMurid").value.trim(),
        idSekolah: document.getElementById("idSekolah").value.trim(),
        tahun: document.getElementById("tahun").value,
        jantina: jantinaDipilih.value,
        tarikhLahir: document.getElementById("tarikhLahir").value,
        suratBeranak: document.getElementById("suratBeranak").value.trim(),
        bruHims: document.getElementById("bruHims").value.trim(),
        alamat: document.getElementById("alamat").value.trim(),

        ayah: {
          nama: document.getElementById("namaAyah").value.trim(),
          noPintar: document.getElementById("pintarAyah").value.trim(),
          warna: document.getElementById("warnaAyah").value,
          pekerjaan: document.getElementById("pekerjaanAyah").value.trim(),
          telefon: document.getElementById("telefonAyah").value.trim()
        },

        ibu: {
          nama: document.getElementById("namaIbu").value.trim(),
          noPintar: document.getElementById("pintarIbu").value.trim(),
          warna: document.getElementById("warnaIbu").value,
          pekerjaan: document.getElementById("pekerjaanIbu").value.trim(),
          telefon: document.getElementById("telefonIbu").value.trim()
        },

        mudahDihubungi: {
          nama: document.getElementById("namaDihubungi").value.trim(),
          hubungan: document.getElementById("hubunganDihubungi").value.trim(),
          telefon: document.getElementById("telefonDihubungi").value.trim()
        },

        tarikhDaftar: serverTimestamp()
      };

      try {
        await addDoc(collection(db, "students"), dataMurid);

        mesejBerjaya.style.display = "block";
        borang.reset();

        setTimeout(function () {
          window.location.href = "index.html";
        }, 1500);

      } catch (error) {
        console.error("Ralat Firebase:", error);

        mesejRalat.textContent =
          "Maklumat tidak dapat disimpan. " + error.message;

        mesejRalat.style.display = "block";

        butangSimpan.disabled = false;
        butangSimpan.textContent = "Simpan Maklumat";
      }
    });
  </script>

</body>
</html>
