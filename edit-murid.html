<!DOCTYPE html>
<html lang="ms"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Murid | SMMSRBM</title><link rel="stylesheet" href="style.css"></head><body>
<header><h1>Edit Murid</h1><p>SMMSRBM — Sistem Maklumat Murid SR Batu Marang</p></header>
<main class="container"><a class="back-link" href="senarai-murid.html">← Kembali ke Senarai Murid</a>
<form id="borangMurid">
<h2 class="section-title">A. Maklumat Murid</h2>
<div class="form-group"><label for="namaMurid">Nama Penuh Murid</label><input id="namaMurid" required></div>
<div class="two-column">
  <div class="form-group"><label for="idSekolah">ID Sekolah</label><input id="idSekolah" required></div>
  <div class="form-group"><label for="tahun">Tahun</label><select id="tahun" required>
    <option value="">Pilih Tahun</option><option value="1">Tahun 1</option><option value="2">Tahun 2</option>
    <option value="3">Tahun 3</option><option value="4">Tahun 4</option><option value="5">Tahun 5</option><option value="6">Tahun 6</option>
  </select></div>
</div>
<div class="form-group"><label>Jantina</label><div class="radio-group">
  <label><input type="radio" name="jantina" value="Lelaki" required> Lelaki</label>
  <label><input type="radio" name="jantina" value="Perempuan"> Perempuan</label>
</div></div>
<div class="three-column">
  <div class="form-group"><label for="tarikhLahir">Tarikh Lahir</label><input type="date" id="tarikhLahir"></div>
  <div class="form-group"><label for="suratBeranak">No. Surat Beranak</label><input id="suratBeranak"></div>
  <div class="form-group"><label for="bruHims">No. Bru-HIMS</label><input id="bruHims"></div>
</div>

<h2 class="section-title">B. Alamat Tempat Tinggal</h2>
<div class="form-group"><label for="alamat">Alamat Lengkap</label><textarea id="alamat"></textarea></div>

<h2 class="section-title">C. Maklumat Ayah</h2>
<div class="form-group"><label for="namaAyah">Nama Penuh</label><input id="namaAyah"></div>
<div class="two-column">
  <div class="form-group"><label for="pintarAyah">No. Pintar</label><input id="pintarAyah"></div>
  <div class="form-group"><label for="warnaAyah">Warna Kad Pintar</label><select id="warnaAyah">
    <option value="">Pilih Warna</option><option>Kuning</option><option>Ungu</option><option>Hijau</option><option>Lain-lain</option>
  </select></div>
</div>
<div class="two-column">
  <div class="form-group"><label for="pekerjaanAyah">Pekerjaan</label><input id="pekerjaanAyah"></div>
  <div class="form-group"><label for="telefonAyah">No. Telefon</label><input type="tel" id="telefonAyah"></div>
</div>

<h2 class="section-title">D. Maklumat Ibu</h2>
<div class="form-group"><label for="namaIbu">Nama Penuh</label><input id="namaIbu"></div>
<div class="two-column">
  <div class="form-group"><label for="pintarIbu">No. Pintar</label><input id="pintarIbu"></div>
  <div class="form-group"><label for="warnaIbu">Warna Kad Pintar</label><select id="warnaIbu">
    <option value="">Pilih Warna</option><option>Kuning</option><option>Ungu</option><option>Hijau</option><option>Lain-lain</option>
  </select></div>
</div>
<div class="two-column">
  <div class="form-group"><label for="pekerjaanIbu">Pekerjaan</label><input id="pekerjaanIbu"></div>
  <div class="form-group"><label for="telefonIbu">No. Telefon</label><input type="tel" id="telefonIbu"></div>
</div>

<h2 class="section-title">E. Penjaga yang Mudah Dihubungi</h2>
<div class="three-column">
  <div class="form-group"><label for="namaDihubungi">Nama Penuh</label><input id="namaDihubungi"></div>
  <div class="form-group"><label for="hubunganDihubungi">Hubungan dengan Murid</label><input id="hubunganDihubungi"></div>
  <div class="form-group"><label for="telefonDihubungi">No. Telefon</label><input type="tel" id="telefonDihubungi"></div>
</div>

<div class="button-group"><button class="btn-primary" id="butangSimpan" type="submit">Simpan Perubahan</button><a class="btn btn-secondary" href="senarai-murid.html">Batal</a></div>
<div id="ok" class="notice ok">Maklumat murid berjaya dikemas kini.</div><div id="bad" class="notice bad"></div>
</form></main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase.js";
const db=getFirestore(initializeApp(firebaseConfig)),id=new URLSearchParams(location.search).get("id");
const v=id=>document.getElementById(id).value.trim(),set=(id,val)=>document.getElementById(id).value=val||"";
const ref=doc(db,"students",id),snap=await getDoc(ref);
if(!snap.exists()){alert("Maklumat murid tidak ditemui.");location.href="senarai-murid.html";}
const x=snap.data(),a=x.ayah||{},i=x.ibu||{},m=x.mudahDihubungi||{};
["namaMurid","idSekolah","tahun","tarikhLahir","suratBeranak","bruHims","alamat"].forEach(k=>set(k,x[k]));
document.querySelector(`input[name="jantina"][value="${x.jantina}"]`)?.click();
set("namaAyah",a.nama);set("pintarAyah",a.noPintar);set("warnaAyah",a.warna);set("pekerjaanAyah",a.pekerjaan);set("telefonAyah",a.telefon);
set("namaIbu",i.nama);set("pintarIbu",i.noPintar);set("warnaIbu",i.warna);set("pekerjaanIbu",i.pekerjaan);set("telefonIbu",i.telefon);
set("namaDihubungi",m.nama);set("hubunganDihubungi",m.hubungan);set("telefonDihubungi",m.telefon);
const f=document.getElementById("borangMurid"),b=document.getElementById("butangSimpan"),ok=document.getElementById("ok"),bad=document.getElementById("bad");
f.addEventListener("submit",async e=>{e.preventDefault();const j=document.querySelector('input[name="jantina"]:checked');b.disabled=true;b.textContent="Sedang menyimpan...";
const data={namaMurid:v("namaMurid"),idSekolah:v("idSekolah"),tahun:v("tahun"),jantina:j?.value||"",tarikhLahir:v("tarikhLahir"),suratBeranak:v("suratBeranak"),bruHims:v("bruHims"),alamat:v("alamat"),
ayah:{nama:v("namaAyah"),noPintar:v("pintarAyah"),warna:v("warnaAyah"),pekerjaan:v("pekerjaanAyah"),telefon:v("telefonAyah")},
ibu:{nama:v("namaIbu"),noPintar:v("pintarIbu"),warna:v("warnaIbu"),pekerjaan:v("pekerjaanIbu"),telefon:v("telefonIbu")},
mudahDihubungi:{nama:v("namaDihubungi"),hubungan:v("hubunganDihubungi"),telefon:v("telefonDihubungi")},tarikhKemaskini:serverTimestamp()};
try{await updateDoc(ref,data);ok.style.display="block";setTimeout(()=>location.href=`profil-murid.html?id=${id}`,800);}
catch(err){bad.textContent="Maklumat tidak dapat dikemas kini: "+err.message;bad.style.display="block";b.disabled=false;b.textContent="Simpan Perubahan";}});
</script></body></html>
